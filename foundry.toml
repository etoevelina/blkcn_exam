## Foundry configuration for the BChT2 Prediction Market capstone.
## Targets: Arbitrum Sepolia (primary), local Anvil (dev).
## Solidity 0.8.26, evm_version=cancun (OZ 5.1+ uses mcopy; Arbitrum Sepolia supports Cancun).

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

solc = "0.8.26"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200

# Strip metadata from on-chain bytecode for reproducible builds + cleaner verification.
bytecode_hash = "none"
cbor_metadata = false

# Surface compiler warnings as part of CI signal.
deny_warnings = false
verbosity = 2

# Fuzz/invariant tuning. The W10 final config will bump these.
[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 64
depth = 64
fail_on_revert = false
call_override = false

[lint]
# Off-by-default stylistic lints we deliberately don't enforce
# (they would force a refactor of OZ-pattern code).
exclude_lints = [
    "screaming-snake-case-immutable",
    "screaming-snake-case-const",
    "unsafe-typecast",
    "asm-keccak256",
    "unsafe-cheatcode",
    "mixed-case-function",
    "unused-import",
    "erc20-unchecked-transfer",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
multiline_func_header = "params_first"

[doc]
out = "docs/forge-doc"

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614, url = "https://api-sepolia.arbiscan.io/api" }
